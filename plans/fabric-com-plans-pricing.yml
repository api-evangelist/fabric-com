aid: fabric-com
name: fabric Plans and Pricing
description: >-
  fabric's commercial offering is sold as enterprise contracts rather than
  self-serve tiers. The package below captures the modular product surface a
  customer can opt into; commercial terms (per-order pricing, platform fee,
  professional services) are negotiated with fabric Sales.
modified: '2026-05-25'
specification: API Commons Plans 0.1
contact:
  url: https://fabric.inc/request-demo
  email: sales@fabric.inc
plans:
  - id: composable-commerce-platform
    name: fabric Composable Commerce Platform (Enterprise)
    pricingModel: enterprise-contract
    billing: annual
    geo: Global
    description: >-
      The full v3 commerce platform — PIM, Catalog Connector, Cart, Checkout,
      Offers (Prices, Pricing Engine, Promotions), Inventory, Orders (OMS),
      Shipments, Invoices, Customers, Identity, Experiences, and the Cart
      Orchestrator (ShopperXP). Customers select the modules they need.
    modules:
      - fabric-pim-api
      - fabric-catalog-connector-api
      - fabric-cart-api
      - fabric-checkout-api
      - fabric-cart-orchestrator-api
      - fabric-offers-prices-api
      - fabric-offers-pricing-engine-api
      - fabric-offers-promotions-api
      - fabric-inventory-api
      - fabric-orders-api
      - fabric-shipments-api
      - fabric-invoices-api
      - fabric-customers-api
      - fabric-identity-api
      - fabric-experiences-api
    meters:
      - id: gmv
        label: Gross Merchandise Value processed
        notes: Common headline meter in enterprise commerce contracts.
      - id: orders
        label: Orders per month
      - id: api-calls
        label: API calls per month
        notes: fabric reports 1B+ API calls served with sub-50ms latency at platform level.
    accessControl: bearer-token-oauth2
  - id: neon-agentic-commerce
    name: fabric NEON (Agentic Commerce)
    pricingModel: enterprise-contract
    billing: annual
    geo: Global
    description: >-
      fabric NEON — the agentic commerce add-on covering Monitor and Activate
      via the Product Agent API. Available as an add-on to the platform or
      standalone for brands whose system of record remains elsewhere.
    modules:
      - fabric-product-agent-api
    meters:
      - id: products-monitored
        label: Products monitored across AI search surfaces
      - id: activations
        label: Channel activations per month
    accessControl: bearer-token-oauth2
notes:
  - >-
    fabric does not publish a self-serve price card. The pricing surface is
    sales-led with a "Request Demo" entry point.
  - >-
    Trial / sandbox access is granted through fabric Sales; there is no public
    free tier.

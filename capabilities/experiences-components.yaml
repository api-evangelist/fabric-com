naftiko: 1.0.0-alpha2
info:
  label: fabric Experiences — Components
  description: 'fabric Experiences — Components. 2 operations. Lead operation: Get Live Global Components for a Channel. Self-contained Naftiko capability covering one fabric business surface.'
  tags:
  - Fabric
  - Components
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FABRIC_ACCESS_TOKEN: FABRIC_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: experiences-components
    baseUri: https://cdn.xm.fabric.inc/api
    description: fabric Experiences — Components consumed operations from fabric-experiences-openapi.yml.
    resources:
    - name: v2-global-component-live
      path: /v2/global-component/live
      operations:
      - name: get-live-global-components-for-a-channel
        method: GET
        description: 'Get Live Global Components for a Channel'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-menu-live
      path: /v2/menu/live
      operations:
      - name: get-live-menu-for-a-channel
        method: GET
        description: 'Get Live Menu for a Channel'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      value: '{{env.FABRIC_ACCESS_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: experiences-components-rest
    port: 8080
    description: REST adapter for fabric Experiences — Components. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/global-component/live
      name: v2-global-component-live
      description: REST surface for v2-global-component-live.
      operations:
      - method: GET
        name: get-live-global-components-for-a-channel
        description: 'Get Live Global Components for a Channel'
        call: experiences-components.get-live-global-components-for-a-channel
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/menu/live
      name: v2-menu-live
      description: REST surface for v2-menu-live.
      operations:
      - method: GET
        name: get-live-menu-for-a-channel
        description: 'Get Live Menu for a Channel'
        call: experiences-components.get-live-menu-for-a-channel
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: experiences-components-mcp
    port: 9090
    transport: http
    description: MCP adapter for fabric Experiences — Components. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: fabric-get-live-global-components-for-a-channel
      description: 'Get Live Global Components for a Channel'
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: experiences-components.get-live-global-components-for-a-channel
      outputParameters:
      - type: object
        mapping: $.
    - name: fabric-get-live-menu-for-a-channel
      description: 'Get Live Menu for a Channel'
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: experiences-components.get-live-menu-for-a-channel
      outputParameters:
      - type: object
        mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: fabric Product Agent — Monitor
  description: 'fabric Product Agent — Monitor. 5 operations. Lead operation: Create Access Token. Self-contained Naftiko capability covering one fabric business surface.'
  tags:
  - Fabric
  - Monitor
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FABRIC_ACCESS_TOKEN: FABRIC_ACCESS_TOKEN
capability:

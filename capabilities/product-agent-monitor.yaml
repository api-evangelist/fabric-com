    baseUri: https://commerceos.aiagents.fabric.inc/api
    description: fabric Product Agent — Monitor consumed operations from fabric-product-agent-openapi.yml.
    resources:
    - name: platform-v1-auth-token
      path: /platform/v1/auth/token
      operations:
      - name: create-access-token
        method: POST
        description: 'Create Access Token'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-categories-import
      path: /v2/categories/import
      operations:
      - name: bulk-import-categories
        method: POST
        description: 'Bulk Import Categories'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-categories-import-import-id
      path: /v2/categories/import/{import_id}
      operations:
      - name: get-category-import-status
        method: GET
        description: 'Get Category Import Status'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: import_id
          in: path
          type: string
          required: true
    - name: v2-attributes-import
      path: /v2/attributes/import
      operations:
      - name: import-attributes-from-csv
        method: POST
        description: 'Import Attributes from CSV'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-attributes-import-import-id
      path: /v2/attributes/import/{import_id}
      operations:
      - name: get-attribute-import-status
        method: GET
        description: 'Get Attribute Import Status'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: import_id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.FABRIC_ACCESS_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: product-agent-monitor-rest
    port: 8080
    description: REST adapter for fabric Product Agent — Monitor. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/platform/v1/auth/token
      name: platform-v1-auth-token
      description: REST surface for platform-v1-auth-token.
      operations:
      - method: POST
        name: create-access-token
        description: 'Create Access Token'
        call: product-agent-monitor.create-access-token
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/categories/import
      name: v2-categories-import
      description: REST surface for v2-categories-import.
      operations:
      - method: POST
        name: bulk-import-categories
        description: 'Bulk Import Categories'
        call: product-agent-monitor.bulk-import-categories

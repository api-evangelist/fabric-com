        description: 'Import Attributes from CSV'
        call: product-agent-monitor.import-attributes-from-csv
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/attributes/import/{import_id}
      name: v2-attributes-import-import-id
      description: REST surface for v2-attributes-import-import-id.
      operations:
      - method: GET
        name: get-attribute-import-status
        description: 'Get Attribute Import Status'
        call: product-agent-monitor.get-attribute-import-status
        with:
          import_id: rest.path.import_id
        outputParameters:
        - type: object
          mapping: $.

      - name: authorize-payments
        method: POST
        description: 'Authorize Payments'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cartId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orchestrator-carts-cartid-payments-actions-void
      path: /orchestrator/carts/{cartId}/payments/actions/void
      operations:
      - name: void-payments
        method: POST
        description: 'Void Payments'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cartId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true

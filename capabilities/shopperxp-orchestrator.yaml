    baseUri: https://api.fabric.inc/v3
    description: fabric Cart Orchestrator (ShopperXP) consumed operations from fabric-shopperxp-openapi.yml.
    resources:
    - name: orchestrator-carts-cartid
      path: /orchestrator/carts/{cartId}
      operations:
      - name: get-the-cart
        method: GET
        description: 'Get the Cart'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cartId
          in: path
          type: string
          required: true
      - name: delete-cart
        method: DELETE
        description: 'Delete Cart'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cartId
          in: path
          type: string
          required: true
    - name: orchestrator-carts-cartid-coupons-couponcode
      path: /orchestrator/carts/{cartId}/coupons/{couponCode}
      operations:
      - name: apply-coupon
        method: POST
        description: 'Apply Coupon'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cartId
          in: path
          type: string
          required: true
        - name: couponCode
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removes-coupon
        method: DELETE
        description: 'Removes Coupon'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cartId
          in: path
          type: string
          required: true
        - name: couponCode
          in: path
          type: string
          required: true
    - name: orchestrator-carts-cartid-items
      path: /orchestrator/carts/{cartId}/items
      operations:
      - name: add-items
        method: POST
        description: 'Add Items'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cartId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: update-items
        method: PATCH
        description: 'Update Items'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cartId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: delete-items
        method: DELETE
        description: 'Delete Items'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cartId
          in: path
          type: string
          required: true
    - name: orchestrator-carts-cartid-items-itemid-actions-split
      path: /orchestrator/carts/{cartId}/items/{itemId}/actions/split
      operations:
      - name: split-line-items
        method: POST
        description: 'Split Line Items'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cartId
          in: path
          type: string
          required: true
        - name: itemId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true

aid: fabric-com
name: fabric Commerce Vocabulary
description: >-
  Vocabulary for the fabric composable commerce platform — terms, entities,
  and dimensions used across PIM, Catalog, Cart, Offers, Orders, Inventory,
  Identity, Experiences, and Product Agent.
modified: '2026-05-25'
dimensions:
  capability:
    - id: catalog-management
      label: Catalog Management
      services: [fabric-pim-api, fabric-catalog-connector-api]
    - id: pricing-and-offers
      label: Pricing and Offers
      services: [fabric-offers-prices-api, fabric-offers-pricing-engine-api, fabric-offers-promotions-api]
    - id: cart-and-checkout
      label: Cart and Checkout
      services: [fabric-cart-api, fabric-checkout-api, fabric-cart-orchestrator-api]
    - id: order-management
      label: Order Management
      services: [fabric-orders-api, fabric-shipments-api, fabric-invoices-api]
    - id: inventory
      label: Inventory
      services: [fabric-inventory-api]
    - id: shopper-identity
      label: Shopper and Identity
      services: [fabric-identity-api, fabric-customers-api]
    - id: storefront-experience
      label: Storefront Experience
      services: [fabric-experiences-api]
    - id: agentic-commerce
      label: Agentic Commerce
      services: [fabric-product-agent-api]

entities:
  - id: Tenant
    label: fabric Tenant
    description: Customer organization with a dedicated Identity login subdomain.
  - id: Product
    label: Product
    description: Item modeled in PIM, optionally with variants, attributes, and category placements.
  - id: SKU
    label: SKU
    description: Stock keeping unit, the unit at which price and inventory are tracked.
  - id: Category
    label: Category
    description: Hierarchical merchandising node in PIM.
  - id: Price
    label: Price
    description: Base or sale price for a SKU in a price list.
  - id: Promotion
    label: Promotion
    description: Discount on item, cart, or shipping; optionally gated by coupon code.
  - id: Cart
    label: Cart
    description: In-progress shopper basket, guest or authenticated.
  - id: OrderDraft
    label: Order Draft
    description: Cart promoted to an order proposal awaiting checkout completion.
  - id: Order
    label: Order
    description: Committed customer purchase tracked by OMS.
  - id: Shipment
    label: Shipment
    description: Carrier-tracked fulfillment of one or more order lines.
  - id: Invoice
    label: Invoice
    description: Financial record produced from fulfilled order lines.
  - id: Customer
    label: Customer (Shopper)
    description: End consumer with profile and address book.
  - id: PageExperience
    label: Page Experience
    description: Storefront page composition served by Experiences (XM).
  - id: ProductAgentRun
    label: Product Agent Run
    description: Monitor or activate execution against the agentic commerce platform.

terms:
  - term: SKU
    expansion: Stock Keeping Unit
  - term: PIM
    expansion: Product Information Management
  - term: OMS
    expansion: Order Management System
  - term: XM
    expansion: Experiences (formerly known as XM)
  - term: RTPE
    expansion: Real-time Pricing Engine
  - term: NEON
    expansion: fabric's agentic commerce platform
  - term: ShopperXP
    expansion: Cart Orchestrator surface for storefronts

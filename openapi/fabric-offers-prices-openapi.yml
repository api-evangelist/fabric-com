                    maxWidth: 200
                    price: 20.75
            priceAddons:
              - id: 1000000051
        createdAt: 2019-08-20T14:15:22.000Z
        updatedAt: 2019-08-20T14:15:22.000Z
    getPriceRangeById:
      value:
        query:

      type: array
      items:
        type: object
        required:
          - name
          - parentNodeName
        properties:
          name:
            description: Category name to upsert
            type: string
            example: Sofa
          parentNodeName:
            description: >-
              Parent Category breadcrumb starting from **PRIMARY** which is the
              name of root node
            type: string
            example: PRIMARY->Furniture
          order:
            description: >-
              Order in which category will be displayed in Product Catalog in
              Copilot.
            type: number
            example: 2
    BulkUpsertCategoryResponse:
      type: object
      properties:
        success:
          type: array
          items:
            type: object
            properties:
              id:
                description: 24-character system-generated category ID
                type: string
                example: 611686da50fb7e0c5df78c2e
              name:
                type: string
                description: Category name
                example: Sofa
              parentId:
                type: string
                description: 24-character system-generated parent category ID
                example: 63ea48368da1ae00089b7052
              nodeId:
                type: number
                description: Category ID
                example: 12
              message:
                type: string
                example: Categories upserted successfully
        failed:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: testNodeChild
                description: Category name
              parentNodeName:
                type: string
                example: PRIMARY->testNode
                description: Parent category name
              message:
                type: string
                example: Parent node not found
                description: Error message
    CategoryAttributeMatchValue:
      type: object
      properties:
        exact:
          description: Exact value to match
          oneOf:
            - type: string
            - type: integer
            - type: boolean
          example: '1234'
        contains:
          description: Value to match as a substring
          type: string
          example: '1234'
    CategoryAttributeMatch:
      type: object
      properties:
        id:
          description: 24-character system-generated attribute ID
          type: string
          example: 6196b44a5cb04b7ce167cb34
        name:
          description: Attribute name
          type: string
          example: Category Code
        value:
          $ref: '#/components/schemas/CategoryAttributeMatchValue'
    findCategoryRequest:
      type: object
      properties:
        include:
          type: object
          description: Inclusion criteria
          properties:
            children:
              description: >-
                true: Include children in the response <br /> false: Exclude
                children from response
              example: false
              type: boolean
            itemAttributes:
              description: >-
                true: Include item attributes in the response <br /> false:
                Exclude item attributes from the response
              example: false
              type: boolean
            nodeAttributes:
              description: >-
                true: Include category attributes in the response <br /> false:
                Exclude category attributes from the response
              example: false
              type: boolean
            filters:
              description: >-
                true: Include attributes in the response <br /> false: Exclude
                attributes from the response
              example: false
              type: boolean
            sources:
              description: >-
                true: Include sources in the response <br /> false: Exclude
                sources from the response
              example: false
              type: boolean
            statuses:
              description: >-
                true: Include statuses in the response <br /> false: Exclude
                statuses from the response
              example: true
              type: boolean
        type:
          description: >-
            Category type. The primary hierarchy contains all branches, whereas
            alternate hierarchies exist to export alternate organizations of the
            primary hierarchy. If omitted `ALTERNATE` is considered by default.
          example: ALTERNATE
          type: string
          enum:
            - PRIMARY
            - ALTERNATE
        status:
          description: >-
            Category status. Only ALTERNATE Hierarchies can be filtered using
            this paramater. If omitted `ACTIVE` status is considered by default.
          example: ALL
          type: string
          enum:
            - ACTIVE
            - INACTIVE
            - ALL
        page:
          description: Number of pages in the response.
          type: number
          example: 1
        size:
          description: Number of categories per page.
          type: number
          example: 10
        match:
          type: object
          properties:
            attribute:
              $ref: '#/components/schemas/CategoryAttributeMatch'
            and:
              type: array
              items:
                type: object
                properties:
                  attribute:
                    $ref: '#/components/schemas/CategoryAttributeMatch'
            or:
              type: array
              items:
                type: object
                properties:
                  attribute:
                    $ref: '#/components/schemas/CategoryAttributeMatch'

          type: string
          example: >-
            Your export has been queued, you will receive an email once the
            export is ready.
          description: Message corresponding to `code`
        trackingID:
          type: string
          example: 62daee2addfa4f000932cfc9
          description: Tracking ID
    BulkProductAttributeRequest:
      type: array
      items:
        type: object
        properties:
          action:
            type: string
            description: >-
              Action to perform. `id` is required only for `UPDATE`, or `DELETE`
              (not for CREATE). <br /> **Note**: `CREATE` action replaces any
              existing item attribute with the same name, if one already exists.
            enum:
              - CREATE
              - UPDATE
              - DELETE
            example: UPDATE
          id:
            description: A 24-character system-generated attribute ID
            type: string
            example: 621c1122ff2e4507c199b75d
          name:
            description: >-
              Attribute name, which is visible on all relevant Product Catalog
              pages.
            type: string
            example: Weight
          locales:
            type: array
            items:
              type: object
              properties:
                locale:
                  type: string
                  description: Language locale
                  example:
                    - fr-ca
                    - es-us
                name:
                  type: string
                  description: Localized value of 'name' for this attribute
                  example: le poids
          description:
            description: Attribute description
            type: string
            example: Example description.
          mapping:
            description: >-
              Attribute mapping of item. This corresponds to the `Attribute
              Mapping` settings of Product Catalog: `sku`, `title`, `image`,
              `active`, `isVariant`. <br /> **Note**: Most attributes do not
              have a mapping, in which case this will be null. <br />
              **Warning**: Exercise caution while adding or removing mappings of
              attributes, as it could lead to bad data.
            type: string
            example: title
          type:
            description: Attribute type
            type: string
            enum:
              - TEXT
              - BOOLEAN
              - SERIAL
              - DECIMAL
              - INTEGER
              - DATETIME
              - OPTIONS
          textSubType:
            description: Conditionally required sub-type for `TEXT` attribute type
            type: string
            enum:
              - SMALL_TEXT
              - TEXT_AREA
              - HTML
          serialStart:
            description: >-
              Conditionally required to indicate the starting value of `SERIAL`
              attribute type. When enabled, the subsequent attribute values
              increment by 1.
            type: number
            example: 1
          optionsType:
            description: >-
              Conditionally required to indicate the selectable values for the
              `OPTIONS` attribute type
            type: string
            enum:
              - TEXT
              - BOOLEAN
              - DECIMAL
              - INTEGER
              - DATETIME
          format:
            description: >-
              Attribute format. Currently used only for the attribute type
              `DATETIME`.
            type: string
            example: YYYY-MM-DD
          formula:
            description: >-
              JavaScript expression to dynamically compute the attribute's
              value. The type returned must match the attribute's type. If the
              attribute is weight, this formula helps calculate the weight. <br
              /> **Note**: When this is provided, `validation` is ignored.
            type: string
            example: '`${item.weightValue} ${item.weightUnit}`'
          validation:
            type: object
            properties:
              required:
                description: >-
                  true: Attribute is mandatory <br /> false: Attribute is
                  optional
                type: boolean
              inheritable:
                description: >-
                  true: Parent attributes inherited to children items <br />
                  false: Parent attributes not inherited to children items
                type: boolean
              inverse:
                description: >-
                  true: Inverts existing validation (example - requires that the
                  validation does not pass) <br /> false: Follows existing
                  validation
                type: boolean
              unique:
                description: >-
                  true: Specified value is unique across all items or nodes <br
                  /> false: Specified value is not unique
                type: boolean
              exact:
                description: Specified value must exactly match this value
                oneOf:
                  - type: string
                  - type: number
                  - type: boolean
              attributeTypes:
                description: Attribute types
                type: array
                example:
                  - Serial
                  - Integer
                items:
                  type: string
                  enum:
                    - TEXT
                    - BOOLEAN
                    - SERIAL
                    - DECIMAL
                    - INTEGER
                    - ASSET
                    - DATETIME
                    - RESOURCE
                    - DYNAMIC_LOV
              contains:
                description: Specified value must contain this string
                type: string
                example: Demo
              startWith:
                description: Sequence should start with this value
                type: number
                example: 1
              incrementBy:
                description: Sequence should increment by this value
                type: number
                example: 1
              range:
                description: Specified range of values must be between this min and/or max
                type: object
                properties:
                  min:
                    description: >-
                      Specified value must be greater than or equal to this
                      value
                    oneOf:
                      - type: string
                      - type: number
                  max:
                    description: Specified value must be less than or equal to this value
                    oneOf:
                      - type: string
                      - type: number
              formula:
                description: JavaScript expression to determine if the value matches
                type: string
                example: value < 10 || value > 20
              oneOf:
                description: Matches the value if it is one of these
                oneOf:
                  - type: array
                    items:
                      type: string
                  - type: array
                    items:
                      type: number
                  - type: array
                    items:
                      type: boolean
    AttributeMappingSearch:
      type: object
      required:
        - page
        - size
      properties:
        include:
          type: object
          properties:
            attribute:
              type: boolean
              description: >-
                true: include the `attribute` in the response; <br /> false:
                exclude `attribute` in the response
        sort:
          $ref: '#/components/schemas/AttributeMappingSort'
        match:

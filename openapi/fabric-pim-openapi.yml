  parameters:
    xSiteContent:
      name: x-site-context
      in: header
      description: >-
        The `x-site-context` header is a JSON object that contains information
        about the source you wish to pull from. The mandatory `account` is the
        24 character identifier found in Copilot. The `channel` (Sales channel
        ID), `stage` (environment name), and `date` attributes can be used to
        further narrow the scope of your data source.
      required: true
      schema:
        type: string
        example: >-
          {"date": "2023-01-01T00:00:00.000Z", "channel": 12, "account":
          "1234abcd5678efgh9ijklmno","stage":"production"}
    Page:
      in: query
      name: page
      description: >-
        Page number to be retrieved. <br /> **Note**: <br /> 1) Applicable only
        in a paginated response.  <br /> 2) Always paired with `size` <br /> 3)
        No default value set. Unless a value is specified, endpoint returns an
        error.
      example: 1
      schema:
        type: number
    MandatoryPage:
      in: query
      name: page
      description: >-
        Page number to be retrieved. Applicable only in a paginated response and
        always paired with `size`.
      example: 1
      schema:
        type: number
      required: true
    Size:
      in: query
      name: size
      description: >-
        Number of records per page <br /> **Note**: <br /> 1) Always paired with
        `page`. <br /> 2) Applicable only in a paginated response. <br /> 3) No
        default value set. Unless a value is specified, endpoint returns an
        error.
      example: 10
      schema:
        type: number
    MandatorySize:
      in: query
      name: size
      description: >-
        Number of records per page. Applicable only in a paginated response and
        always paired with `page`.
      example: 10
      schema:
        type: number
      required: true

        parentSku:
          description: >-
            “Stock Keeping Unit (SKU) of the parent item. <br /> Set the value
            as `detach` or `null` to disassociate the item from parent item.”
          type: string
          nullable: true
          example: sku234
        attributeValues:
          type: array
          items:
            anyOf:
              - $ref: '#/components/schemas/AttributeValue'
              - $ref: '#/components/schemas/AttributeValueFrenchLocale'
        inheritedAttributes:
          description: >-
            Category item attributes to inherit from parent item to children
            items
          $ref: '#/components/schemas/InheritItemAttributesUpdate'
    BundleUpdateRequest:

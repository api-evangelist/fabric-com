            type:
              type: string
              enum:
                - ITEM
                - BUNDLE
              default: ITEM
              example: ITEM
              description: Item type
            ids:
              type: array
              description: Item IDs
              minItems: 1
              items:
                type: string
              example:
                - 611686da50fb7e0c5df78c2e

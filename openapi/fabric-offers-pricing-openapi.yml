          nullable: true
          example: order
    promotionDiscount:
      type: object
      description: Promotion discount
      example:
        amount: 100.15
        quantity: 1
        proratedAmount: 100.15
        proratedQuantity: 1
        application: 1
        promotion:
          id: 6197ec46e836ff000952d668
          value: 2000.15
          groupId: 61a6354d0d70e30009415f16
          level: 1
          isStackable: true
          isAlwaysApplied: true
          name: 20% OFF
          type: Coupon
          discountType: AMOUNT_OFF
          stackingType: STACKABLE
      properties:
        amount:
          type: number
          description: >-
            The actual discount amount applied to the price. For example,
            specifying 100.15 for a product with a base price of 2000.15 results
            in a discounted price of 1900.
          format: double
          example: 100.15
        quantity:
          type: integer
          description: The number of items eligible for the promotional discount.
          format: int32
          example: 5
        proratedAmount:
          type: number
          description: >-
            The discount amount distributed proportionally among all the
            selected items. The distribution is determined based on each item's
            price relative to the total price of all participating items.
            Typically, `proratedAmount` matches the `amount`. However, there
            might be variations, particularly in the context of Buy-Get
            promotions.
          format: double
          example: 1000.15
        proratedQuantity:
          type: integer
          description: >-
            This is used in conjunction with `proratedAmount` to determine the
            discount portion allocated to the respective units of BuyGet
            promotions. This is applicable in partial return scenarios.
          format: int32
          example: 5
        application:
          type: integer
          nullable: true
          description: >-
            An identifier for an instance of the Buy-Get promotion that can be
            applied repeatedly. For example, consider a promotion - Buy 1 shirt
            and get 1 pant at a 20% off. If a shopper buys three shirts, 20%
            discount is individually applied to each shirt-pant pair. Each such
            discounted pair is assigned a unique `application` number for
            tracking purposes.
          format: int32
          example: 1
        promotion:
          type: object
          description: The promotion details.
          example:
            id: 6197ec46e836ff000952c668
            value: 2000.15
            groupId: 61a6354d0d70e30009415f16
            level: 1
            isStackable: true
            isAlwaysApplied: true
            name: 20% OFF
            type: Coupon
            discountType: AMOUNT_OFF
            stackingType: STACKABLE
          properties:
            id:
              type: string
              description: >-
                A 24-character system-generated coupon ID generated using the
                [create coupon](/v3/api-reference/offers/coupons/create-coupon)
                endpoint.
              example: 6197ec46e836ff000952c667
            value:
              type: number
              description: The discount in percent or amount.
              format: double
              example: 2000.15
            groupId:
              type: string
              nullable: true
              description: ID of the group or category this product belongs to
              example: 61a6354d0d70e30009415f16
            level:
              type: integer
              nullable: true
              description: The order in which the current promotion is executed.
              format: int32
              example: 1
            isStackable:
              type: boolean
              nullable: true
              description: >-
                A flag indicating whether the promotion is stackable. Set to
                `true` to combine the given promotion with other promotions. The
                discount of the current promotion is combined with other
                promotions, if applicable, to the item. Set to `false` if the
                promotion isn't stackable; the given promotion can't be combined
                with other promotions.
              example: true
            isAlwaysApplied:
              type: boolean
              nullable: true
              description: >-
                A flag indicating whether the promotion is always applied
                regardless of any exclusive promotions on the same item. Set to
                `true` if the promotion is always applied and set to `false` if
                the promotion isn't applied on the item by default.
              example: true
            stackingType:
              type: string
              description: >-
                Defines the rules for how a promotion can be combined with other
                promotions. This field determines whether a specific promotion
                can be applied in conjunction with other active promotions
                during a transaction or if it must be used exclusively. Possible
                values: - `STACKABLE`: This promotion can be combined with other
                stackable promotions, allowing multiple
                  discounts to be applied together. The order in which stackable promotions are applied
                  is determined by the `level` field, with promotions having a higher priority (lower numeric value)
                  being applied before those with a lower priority.
                - `EXCLUSIVE`: This promotion can't be combined with any other
                promotions. The `level` field is
                  used to determine which exclusive promotion will be evaluated and applied first. Once an exclusive
                  promotion is applied, no other promotions can be used in the same transaction.
                - `TYPE_EXCLUSIVE`: This promotion can't be combined with other
                promotions of the same type.
                  The `level` field is used to determine which promotion within the same type will be evaluated and
                  applied first.
                - `UNIVERSAL`: This promotion can be combined with any other
                promotions without restrictions.
                  Universal promotions will be evaluated last.
              enum:
                - STACKABLE
                - EXCLUSIVE
                - TYPE_EXCLUSIVE
                - UNIVERSAL
              example: STACKABLE
            name:
              type: string
              description: The name of the promotion.
              example: 20% off
            type:
              type: string
              description: The type of the promotion.
              example: COUPON
            discountType:
              example: PERCENTAGE_OFF
              type: string
              description: The type of discount.
              enum:
                - PERCENTAGE_OFF
                - AMOUNT_OFF
                - FIXED_PRICE

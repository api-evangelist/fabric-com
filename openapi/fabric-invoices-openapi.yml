          type: string
        invoicedAt:
          description: >-
            This is the system-generated timestamp of when the invoice was
            created in UTC.
          example: '2022-08-01T20:03:28.483Z'
          format: date-time
          type: string
        location:
          $ref: '#/components/schemas/invoiceLocation'

            endpoint.
          example: a8577d7f-0d4d-4b22-8e85-7b4a2e90dc93
        tax:
          type: array
          description: An array containing fulfillment tax data.
          items:
            $ref: '#/components/schemas/TaxData'
        fees:
          type: array
          description: An array containing fulfillment fee taxes.
          items:
            $ref: '#/components/schemas/FeeTaxRequest'
      description: Fulfillment Tax Request

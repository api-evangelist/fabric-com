    inventorySearchFilter:
      description: >-
        Criteria to find inventory. To search using a single value,
        `valueSearchFilter` is considered. To search using multiple values,
        `valuesSearchFilter` is considered.
      discriminator:
        mapping:
          EQ: '#/components/schemas/valueSearchFilter'
          GT: '#/components/schemas/valueSearchFilter'
          GTE: '#/components/schemas/valueSearchFilter'
          IN: '#/components/schemas/valuesSearchFilter'
          LT: '#/components/schemas/valueSearchFilter'
          LTE: '#/components/schemas/valueSearchFilter'
          NEQ: '#/components/schemas/valueSearchFilter'
          NIN: '#/components/schemas/valuesSearchFilter'
        propertyName: condition
      properties:
        condition:
          default: EQ
          description: >-
            Filter conditions. **EQ (Equal to):** Searches for exact match.
            **NEQ (Not equal to):** Searches by excluding the specified value.
            **IN:** Search for multiple values. **NIN (Not IN):** Excludes the
            specified values in the search. **LT (Less than):** Searches for
            values that are less than the specified value. **GT (Greater
            than):**  Search for values that are greater than the specified
            value. **LTE (Less than or equal to):** Searches for values that are
            less than or equal to the specified value. **GTE (Greater than or
            equal to):** Searches for values that are greater than or equal to
            the specified value.
          enum:
            - EQ
            - NEQ
            - IN
            - NIN
            - LT
            - GT
            - LTE
            - GTE
          example: EQ
          type: string
        field:
          description: Field name
          example: inventory.sku
          pattern: ^inventory\.[a-zA-Z.\-_]*
          type: string
        group:
          default: Default
          description: Group name
          example: GroupA
          type: string
      required:
        - condition
        - field
      type: object

        '500':
          content:
            application/json:
              example:
                message: Internal server error
                type: SERVER_ERROR
              schema:
                $ref: '#/components/schemas/errorResponse'
          description: Internal server error
          headers:
            x-fabric-request-id:
              $ref: '#/components/headers/xFabricRequestIdResponseHeader'
      summary: Find Inventory of Specific Items in a Specific Region
      tags:
        - Inventory
  /inventories/actions/hard-reserve-search:
    post:
      description: Search for hard reservations based on filter criteria.
      operationId: search
      parameters:
        - $ref: '#/components/parameters/xFabricTenantId'
